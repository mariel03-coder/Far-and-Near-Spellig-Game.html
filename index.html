<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon Spelling Battle!</title>
    <style>
        :root {
            --p1-color: #3498db; /* Blue */
            --p2-color: #e74c3c; /* Red */
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial Black', Gadget, sans-serif;
            background: #2c3e50;
            color: white;
            user-select: none;
            touch-action: none;
        }
        
        /* Game Layout */
        #game-screen { display: flex; width: 100vw; height: 100vh; }
        .player-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: start; position: relative; padding: 20px; border: 5px solid; }
        #p1 { border-color: var(--p1-color); background: radial-gradient(#60a3d9, #2c3e50); }
        #p2 { border-color: var(--p2-color); background: radial-gradient(#e67e22, #c0392b); }
        
        /* UI Elements */
        .score-board { font-size: 32px; font-weight: bold; text-shadow: 2px 2px black; }
        .pokemon-display { margin: 40px 0; min-height: 200px; text-align: center; }
        .pokemon-img { max-width: 150px; height: auto; }
        .vocab-prompt { font-size: 24px; color: #f1c40f; text-shadow: 1px 1px black; }
        
        /* Spelling Area */
        .spelling-display {
            font-size: 60px;
            letter-spacing: 15px;
            margin: 30px 0;
            min-height: 70px;
            border-bottom: 5px dashed white;
            text-transform: uppercase;
        }
        .correct { color: #2ecc71; animation: celebrate 0.5s ease; } /* Green */
        .error { color: #8e44ad; animation: shake 0.3s ease; } /* Purple */

        /* Letter Buttons */
        .letter-container { display: flex; gap: 15px; margin-top: auto; padding-bottom: 50px; flex-wrap: wrap; justify-content: center;}
        .letter-btn {
            width: 70px; height: 70px;
            background: #ecf0f1; color: black;
            border: 4px solid #7f8c8d; border-radius: 50%;
            font-size: 40px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px #7f8c8d;
            text-transform: uppercase;
        }
        .letter-btn:active { transform: translateY(4px); box-shadow: 0 2px #7f8c8d; }
        .letter-btn.disabled { opacity: 0.5; pointer-events: none; background: #95a5a6; }

        /* Start Screen */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
        h1 { font-size: 60px; color: #f1c40f; text-shadow: 4px 4px #c0392b; -webkit-text-stroke: 2px #3498db; }
        #start-btn {
            padding: 20px 50px; font-size: 30px; font-weight: bold;
            background: #2ecc71; color: white; border: none; border-radius: 15px;
            cursor: pointer; box-shadow: 0 8px #27ae60; margin-top: 30px;
        }

        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        @keyframes celebrate { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Pokémon<br>Spelling Battle!</h1>
        <p style="font-size: 20px;">Player 1 (Left) vs Player 2 (Right)</p>
        <p>Spell 'NEAR' or 'FAR' the fastest to catch the Pokémon!</p>
        <button id="start-btn" onclick="startGame()">BATTLE!</button>
    </div>

    <div id="game-screen">
        <div class="player-side" id="p1">
            <div class="score-board">P1: <span id="p1-score">0</span></div>
            <div class="pokemon-display">
                <img id="p1-pokemon-img" class="pokemon-img" src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/025.png" alt="Pikachu">
                <div id="p1-prompt" class="vocab-prompt">Is he NEAR?</div>
            </div>
            <div id="p1-spelling-display" class="spelling-display">____</div>
            <div class="letter-container" id="p1-letters">
                </div>
        </div>

        <div class="player-side" id="p2">
            <div class="score-board">P2: <span id="p2-score">0</span></div>
            <div class="pokemon-display">
                <img id="p2-pokemon-img" class="pokemon-img" src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/150.png" alt="Mewtwo">
                <div id="p2-prompt" class="vocab-prompt">Is he FAR?</div>
            </div>
            <div id="p2-spelling-display" class="spelling-display">____</div>
            <div class="letter-container" id="p2-letters">
                </div>
        </div>
    </div>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    
    <audio id="sfx-correct" src="https://actions.google.com/sounds/v1/cartoon/clink_vibrant.ogg"></audio>
    <audio id="sfx-wrong" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>
    <audio id="sfx-catch" src="https://actions.google.com/sounds/v1/sci-fi/robot_power_up.ogg"></audio>

<script>
    const gameState = {
        scores: { p1: 0, p2: 0 },
        currentWord: '',
        currentPrompt: '',
        p1Input: '',
        p2Input: '',
        roundActive: false
    };

    // DOM References
    const displays = {
        p1Score: document.getElementById('p1-score'),
        p2Score: document.getElementById('p2-score'),
        p1Spelling: document.getElementById('p1-spelling-display'),
        p2Spelling: document.getElementById('p2-spelling-display'),
        p1Letters: document.getElementById('p1-letters'),
        p2Letters: document.getElementById('p2-letters'),
        p1Prompt: document.getElementById('p1-prompt'),
        p2Prompt: document.getElementById('p2-prompt')
    };

    const sfx = {
        bg: document.getElementById('bgMusic'),
        correct: document.getElementById('sfx-correct'),
        wrong: document.getElementById('sfx-wrong'),
        catch: document.getElementById('sfx-catch')
    };

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        sfx.bg.play(); // Background music starts
        sfx.bg.volume = 0.3; // Lower music volume
        newRound();
    }

    function newRound() {
        gameState.p1Input = '';
        gameState.p2Input = '';
        gameState.roundActive = true;

        // Choose word based on random round type (0 = NEAR, 1 = FAR)
        const roundType = Math.floor(Math.random() * 2);
        if (roundType === 0) {
            gameState.currentWord = 'NEAR';
            gameState.currentPrompt = 'Is Pikachu NEAR?';
        } else {
            gameState.currentWord = 'FAR';
            gameState.currentPrompt = 'Is Mewtwo FAR?';
        }

        // Update Prompts
        displays.p1Prompt.innerText = gameState.currentPrompt;
        displays.p2Prompt.innerText = gameState.currentPrompt;

        // Reset Spelling Displays (underscore blanks)
        const blanks = '_'.repeat(gameState.currentWord.length);
        displays.p1Spelling.innerText = blanks;
        displays.p2Spelling.innerText = blanks;
        displays.p1Spelling.className = 'spelling-display';
        displays.p2Spelling.className = 'spelling-display';

        // Shuffle letters and create buttons for both players
        setupLetters('p1', displays.p1Letters);
        setupLetters('p2', displays.p2Letters);
    }

    function setupLetters(player, container) {
        container.innerHTML = '';
        const letters = gameState.currentWord.split('');
        
        // Shuffle letters (Fisher-Yates)
        for (let i = letters.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [letters[i], letters[j]] = [letters[j], letters[i]];
        }

        letters.forEach(letter => {
            const btn = document.createElement('div');
            btn.className = 'letter-btn';
            btn.innerText = letter;
            // Use pointerdown for fastest response on touch screens
            btn.addEventListener('pointerdown', (e) => handleLetterTap(player, letter, e.target));
            container.appendChild(btn);
        });
    }

    function handleLetterTap(player, letter, buttonElement) {
        if (!gameState.roundActive) return;

        let playerInput = (player === 'p1') ? gameState.p1Input : gameState.p2Input;
        const currentSpellingIndex = playerInput.length;
        const targetLetter = gameState.currentWord[currentSpellingIndex];

        if (letter === targetLetter) {
            // CORRECT LETTER
            playerInput += letter;
            if (player === 'p1') gameState.p1Input = playerInput; else gameState.p2Input = playerInput;
            
            // Update display
            updateSpellingDisplay(player, playerInput);
            
            // Disable only that specific button instance
            buttonElement.classList.add('disabled');
            sfx.correct.play();

            // Check Win Condition
            if (playerInput === gameState.currentWord) {
                gameState.roundActive = false;
                handleWin(player);
            }
        } else {
            // WRONG LETTER
            sfx.wrong.play();
            flashError(player);
        }
    }

    function updateSpellingDisplay(player, input) {
        const displayEl = (player === 'p1') ? displays.p1Spelling : displays.p2Spelling;
        const blanksNeeded = gameState.currentWord.length - input.length;
        displayEl.innerText = input + '_'.repeat(blanksNeeded);
    }

    function flashError(player) {
        const displayEl = (player === 'p1') ? displays.p1Spelling : displays.p2Spelling;
        displayEl.classList.add('error');
        setTimeout(() => displayEl.classList.remove('error'), 300);
    }

    function handleWin(winner) {
        // Celebrate winner
        const displayEl = (winner === 'p1') ? displays.p1Spelling : displays.p2Spelling;
        displayEl.classList.add('correct');
        sfx.catch.play();

        gameState.scores[winner]++;
        displays[`${winner}Score`].innerText = gameState.scores[winner];

        // Brief delay before the next round
        setTimeout(newRound, 1500);
    }
</script>
</body>
</html>
